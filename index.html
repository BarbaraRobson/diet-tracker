<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Diet Tracker">
    <title>Diet Tracker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <h1>Diet Tracker</h1>
        <p class="version-label" id="versionLabel"></p>
      </header>

      <nav class="bottom-nav" id="bottomNav" aria-label="Main menu">
        <button data-view="today" type="button">Today</button>
        <button data-view="week" type="button">7 day totals</button>
        <button data-view="guide" type="button">Unit guide</button>
        <button data-view="transfer" type="button">Import/export</button>
      </nav>

      <main>
        <section class="view active" id="todayView">
          <div class="date-row">
            <button class="round-button" id="prevDay" type="button" aria-label="Previous day">&#8249;</button>
            <div>
              <input id="datePicker" class="date-picker" type="date" aria-label="Choose date">
            </div>
            <button class="round-button" id="nextDay" type="button" aria-label="Next day">&#8250;</button>
          </div>
          <div id="progressList" class="progress-list"></div>
          <section class="meal-panel">
            <div class="section-heading">
              <h3>Meals</h3>
              <button id="copyMealButton" class="ghost-button" type="button">Copy</button>
            </div>
            <div id="mealList" class="meal-list"></div>
          </section>
        </section>

        <section class="view" id="mealView" aria-labelledby="mealTitle">
          <div class="view-heading">
            <button class="round-button" id="cancelMeal" type="button" aria-label="Back">&#8249;</button>
            <h2 id="mealTitle">Add meal</h2>
          </div>
          <form id="mealForm" class="meal-form">
            <label class="field">
              <span>Meal name</span>
              <input id="mealName" type="text" autocomplete="off" placeholder="Time of day">
            </label>
            <div id="mealFields" class="meal-fields"></div>
            <div class="form-actions">
              <button class="danger-button" id="deleteMeal" type="button" hidden>Remove</button>
              <button class="primary-button" type="submit">Save meal</button>
            </div>
          </form>
        </section>

        <section class="view" id="copyView" aria-labelledby="copyTitle">
          <div class="view-heading">
            <button class="round-button" id="closeCopy" type="button" aria-label="Back">&#8249;</button>
            <h2 id="copyTitle">Copy a meal</h2>
          </div>
          <input id="copySearch" class="search-input" type="search" placeholder="Search recent meals">
          <div id="copyList" class="copy-list"></div>
        </section>

        <section class="view" id="weekView" aria-labelledby="weekTitle">
          <div class="view-heading">
            <button class="round-button backToToday" type="button" aria-label="Back">&#8249;</button>
            <h2 id="weekTitle">7 day totals</h2>
          </div>
          <div id="weekSummary" class="week-summary"></div>
        </section>

        <section class="view" id="guideView" aria-labelledby="guideTitle">
          <div class="view-heading">
            <button class="round-button backToToday" type="button" aria-label="Back">&#8249;</button>
            <h2 id="guideTitle">Unit guide</h2>
          </div>
          <div id="guideList" class="guide-list"></div>
        </section>
        <section class="view" id="transferView" aria-labelledby="transferTitle">
          <div class="view-heading">
            <button class="round-button backToToday" type="button" aria-label="Back">&#8249;</button>
            <h2 id="transferTitle">Import/export</h2>
          </div>
          <div class="transfer-panel">
            <button class="primary-button" id="exportCsvButton" type="button">Save CSV</button>
            <button class="ghost-button" id="exportJsonButton" type="button">Save JSON</button>
            <button class="ghost-button" id="importJsonButton" type="button">Load JSON</button>
            <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
            <p class="transfer-note">JSON exports include the app version and restore the full local record.</p>
          </div>
        </section>
      </main>

      <button class="fab" id="addMeal" type="button" aria-label="Add meal">+</button>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
